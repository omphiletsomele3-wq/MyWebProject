<!DOCTYPE html>
<html>

<head>
    <title>Enquiry - Hearth & Grain Bakery</title>

    <link rel="stylesheet" href="css/styles.css">
</head>

<body>

    <header>
        <h1>Hearth & Grain Bakery</h1>
    </header>

    <nav>
        <a href="index.html">Home</a>
        <a href="menu.html">Menu</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
        <a href="enquiry.html">Enquiry</a>
    </nav>

    <main class="enquiry-page">

        <section class="enquiry-intro">

            <h2>Customer Enquiry Form</h2>

            <p>
                Complete the form below for special orders,
                catering requests, event bookings, or general enquiries.
            </p>

        </section>

        <section class="enquiry-container">

            <form class="enquiry-form">

                <label>Full Name</label>
                <input type="text" placeholder="Enter your full name" required>

                <label>Email Address</label>
                <input type="email" placeholder="Enter your email address" required>

                <label>Phone Number</label>
                <input type="tel" placeholder="Enter your phone number">

                <label>Enquiry Type</label>

                <select>
                    <option>General Enquiry</option>
                    <option>Special Order</option>
                    <option>Catering Request</option>
                    <option>Event Booking</option>
                    <option>Feedback</option>
                </select>

                <label>Preferred Collection Date</label>
                <input type="date">

                <label>Message</label>

                <textarea rows="7"
                    placeholder="Write your enquiry here..."></textarea>

                <div class="checkbox-section">

                    <input type="checkbox">

                    <span>
                        I agree to be contacted regarding my enquiry.
                    </span>

                </div>

                <button type="submit">
                    Submit Enquiry
                </button>

            </form>

        </section>

    </main>

    <footer>
        <p>© 2026 Hearth & Grain Bakery</p>
    </footer>

</body>

</html>
